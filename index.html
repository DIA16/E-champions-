<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Champions Result Verifier</title>
<style>
:root {
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#ededea;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --info-bg:#e6f1fb;--info-text:#185fa5;--info-border:rgba(24,95,165,0.3);
  --success-bg:#eaf3de;--success-text:#3b6d11;
  --danger-bg:#fcebeb;--danger-text:#a32d2d;
  --warn-bg:#faeeda;--warn-text:#854f0b;
  --teal:#0f6e56;--teal-bg:#e1f5ee;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--bg2:#2c2c2a;--bg3:#444441;
    --text:#f1efe8;--text2:#b4b2a9;--text3:#888780;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
    --info-bg:#0c447c;--info-text:#b5d4f4;--info-border:rgba(181,212,244,0.3);
    --success-bg:#27500a;--success-text:#c0dd97;
    --danger-bg:#791f1f;--danger-text:#f7c1c1;
    --warn-bg:#633806;--warn-text:#fac775;
    --teal:#5dcaa5;--teal-bg:#085041;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);font-size:15px;min-height:100vh}
.hdr{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0.85rem 1rem 0.6rem;position:sticky;top:0;z-index:20}
.hdr h1{font-size:15px;font-weight:600;color:var(--text)}
.hdr p{font-size:11px;color:var(--text3);margin-top:1px}
.prog{display:flex;gap:3px;margin-top:8px}
.prog-seg{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.prog-seg.done{background:var(--teal)}
.prog-seg.active{background:var(--info-text)}
.wrap{padding:.85rem .85rem 5rem;max-width:600px;margin:0 auto}
.pg-title{font-size:15px;font-weight:600;color:var(--text);margin:1rem 0 .2rem}
.pg-sub{font-size:12px;color:var(--text3);margin-bottom:.9rem}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
select,input[type=text],input[type=number]{
  width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);
  background:var(--bg);color:var(--text);font-size:15px;margin-bottom:11px;
  -webkit-appearance:none;appearance:none;
}
select:focus,input:focus{outline:none;border-color:var(--info-text);box-shadow:0 0 0 3px var(--info-bg)}
.btn{
  width:100%;padding:12px;border:0.5px solid var(--border2);border-radius:var(--radius);
  background:var(--bg);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;
  transition:background .15s,transform .1s;
}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--info-bg);color:var(--info-text);border-color:var(--info-border)}
.btn-success{background:var(--success-bg);color:var(--success-text);border-color:rgba(59,109,17,.3)}
.btn-teal{background:var(--teal-bg);color:var(--teal);border-color:rgba(15,110,86,.3)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:.9rem;margin-bottom:10px}
.alert{padding:9px 12px;border-radius:var(--radius);font-size:13px;margin-bottom:10px}
.alert-info{background:var(--info-bg);color:var(--info-text)}
.alert-success{background:var(--success-bg);color:var(--success-text)}
.alert-danger{background:var(--danger-bg);color:var(--danger-text)}
.spacer{height:8px}

/* Pupil card */
.pupil-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pupil-num{width:26px;height:26px;border-radius:50%;background:var(--info-bg);color:var(--info-text);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pupil-name-inp{flex:1;margin-bottom:0!important;font-weight:500}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:var(--bg2);border-radius:var(--radius);padding:8px 10px}
.toggle-row label{margin-bottom:0;font-size:13px;color:var(--text2);cursor:pointer;flex:1}
.toggle{width:38px;height:22px;appearance:none;-webkit-appearance:none;background:var(--border2);border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle:checked{background:var(--teal)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle:checked::after{left:18px}

/* Score grid */
.score-hdr{display:grid;grid-template-columns:1fr 54px 54px 62px 60px;gap:3px;margin-bottom:4px;padding:0 1px}
.score-hdr span{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.03em;text-align:center}
.score-hdr span:first-child{text-align:left}
.score-row{display:grid;grid-template-columns:1fr 54px 54px 62px 60px;gap:3px;align-items:center;margin-bottom:4px}
.subj-lbl{font-size:11px;color:var(--text);line-height:1.3;padding-right:3px}
.score-inp{
  margin-bottom:0!important;padding:7px 3px!important;font-size:13px!important;
  text-align:center;border-radius:6px!important;
}
.score-inp:focus{border-color:var(--info-text)!important;box-shadow:0 0 0 2px var(--info-bg)!important;z-index:1;position:relative}
.tot-cell{font-size:12px;font-weight:600;text-align:center;padding:7px 3px;border-radius:6px;background:var(--bg2);color:var(--text3);transition:background .15s,color .15s}
.tot-ok{color:var(--success-text)!important;background:var(--success-bg)!important}
.tot-err{color:var(--danger-text)!important;background:var(--danger-bg)!important}

/* Pupil summary bar */
.pupil-summary{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.sum-chip{flex:1;background:var(--bg2);border-radius:var(--radius);padding:6px 4px;text-align:center}
.sum-chip .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px}
.sum-chip .val{font-size:15px;font-weight:600;color:var(--text)}
.sum-chip.grand .val{color:var(--info-text)}
.sum-chip.avg .val{color:var(--teal)}

/* Results */
table.rt{width:100%;border-collapse:collapse;font-size:13px}
table.rt th{text-align:left;padding:5px 7px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid var(--border)}
table.rt td{padding:7px 7px;color:var(--text);border-bottom:0.5px solid var(--border)}
table.rt tr:last-child td{border-bottom:none}
table.rt td:last-child,table.rt th:last-child{text-align:right}
.sum-row td{font-weight:600;background:var(--bg2)}
.sum-row.grand td{color:var(--info-text)}
.sum-row.avg td{color:var(--teal)}
.res-name{font-size:14px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;background:var(--info-bg);color:var(--info-text)}
.or-divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--text3);font-size:12px}
.or-divider::before,.or-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.btn-upload{background:var(--bg);color:var(--text2);border:0.5px dashed var(--border2);border-radius:var(--radius);padding:12px;width:100%;font-size:14px;font-weight:500;cursor:pointer;display:block;text-align:center;margin-top:4px;transition:background .15s}
.btn-upload:active{transform:scale(.98);background:var(--bg2)}
.upload-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:6px}
.parsed-badge{display:inline-flex;align-items:center;gap:5px;background:var(--success-bg);color:var(--success-text);font-size:12px;font-weight:500;padding:5px 10px;border-radius:20px;margin-top:8px}
</style>
</head>
<body>
<div class="hdr">
  <h1>E-Champions Result Verifier</h1>
  <p id="hdr-sub">E-Champions Nursery and Primary School</p>
  <div class="prog">
    <div class="prog-seg active" id="d1"></div>
    <div class="prog-seg" id="d2"></div>
    <div class="prog-seg" id="d3"></div>
  </div>
</div>
<div class="wrap" id="app"></div>

<script>
const CLASSES=['Basic 1','Basic 2','Basic 3A','Basic 3B','Basic 4A','Basic 4B','Basic 5','Nursery Two','Nursery One','KG 2A','KG 2B','KG 1','Creche'];
const GRP={'Basic 1':1,'Basic 2':1,'Basic 3A':1,'Basic 3B':1,'Basic 4A':1,'Basic 4B':1,'Basic 5':1,'Nursery Two':2,'Nursery One':3,'KG 2A':4,'KG 2B':4,'KG 1':5,'Creche':5};
const SUBJS={
  1:['English','Basic Science','Creative Arts','Social Studies','Mathematics','Civic Education','Yoruba','Physical & Health Education','Verbal Reasoning','Agricultural Science','Computer Studies','Christian Religious Studies','Quantitative Reasoning','Fine Arts','Handwriting','Spelling','Phonics','French'],
  2:['Literacy','Basic Science','Creative Arts','Social Studies','Numeracy','Civic Education','Rhymes','Physical & Health Education','Verbal Reasoning','Computer Studies','Bible Knowledge','Quantitative Reasoning','Handwriting'],
  3:['Literacy','Basic Science','Creative Arts','Social Studies','Numeracy','Civic Education','Rhymes','Physical & Health Education','Verbal Reasoning','Computer Studies','Bible Knowledge','Quantitative Reasoning','Handwriting'],
  4:['Numeracy','Literacy','Quantitative Reasoning','Verbal Reasoning','Social Habits','Health Habits','Poem','Basic Science','Creative Arts'],
  5:['Numeracy','Literacy','Social Habits','Health Habits','Poem','Basic Science','Creative Arts']
};
const RELIG={1:'Christian Religious Studies',2:'Bible Knowledge',3:'Bible Knowledge'};

let S={step:1,cls:'Basic 5',n:0,pupils:[],results:[]};

function prog(n){
  [1,2,3].forEach(i=>{
    const d=document.getElementById('d'+i);
    d.className='prog-seg'+(i<n?' done':i===n?' active':'');
  });
  const labels=['Select class & pupils','Enter scores','Results'];
  document.getElementById('hdr-sub').textContent=labels[n-1]||'';
}

/* ═══ STEP 1 ═══ */
function showStep1(){
  S.step=1; prog(1);
  const opts=CLASSES.map(c=>`<option ${S.cls===c?'selected':''}>${c}</option>`).join('');
  document.getElementById('app').innerHTML=`
<p class="pg-title">Select Class</p>
<p class="pg-sub">Start fresh or continue from a saved CSV file</p>
<div class="card">
  <label>Class</label>
  <select id="cls-sel">${opts}</select>
  <label>Number of pupils</label>
  <input type="number" id="np" inputmode="numeric" min="1" max="60" placeholder="e.g. 25" value="${S.n||''}">
  <button class="btn btn-primary" onclick="doStep1()">Start fresh →</button>
  <div class="or-divider">or continue from saved file</div>
  <label class="btn-upload" for="csv-up">📂 Upload saved CSV to continue editing</label>
  <input type="file" id="csv-up" accept=".csv" style="display:none" onchange="handleUpload(this)">
  <p class="upload-hint">Upload a CSV previously downloaded from this tool</p>
</div>`;
}

function doStep1(){
  const cls=document.getElementById('cls-sel').value;
  const n=parseInt(document.getElementById('np').value);
  if(!n||n<1||n>60){alert('Enter a valid number of pupils (1 – 60).');return;}
  S.cls=cls; S.n=n;
  const grp=GRP[cls]; const subjs=SUBJS[grp];
  const old=S.pupils;
  S.pupils=Array.from({length:n},(_,i)=>old[i]||{
    name:'',inclRelig:true,
    scores:Object.fromEntries(subjs.map(s=>[s,{t1:'',t2:'',ex:''}]))
  });
  showStep2();
}

/* ═══ STEP 2 — No re-render on input ═══ */
function showStep2(){
  S.step=2; prog(2);
  const grp=GRP[S.cls]; const subjs=SUBJS[grp]; const rel=RELIG[grp]||null;
  let html=`
<p class="pg-title">${S.cls} — Enter Scores</p>
<p class="pg-sub">Test: /20 each &nbsp;·&nbsp; Exam: /60 &nbsp;·&nbsp; Total: /100</p>
<div class="alert alert-info" style="margin-bottom:10px">Totals update live. Tap <strong>Tab</strong> or <strong>Next</strong> to move between fields.</div>`;

  S.pupils.forEach((p,pi)=>{
    const relHidden=rel&&!p.inclRelig;
    html+=`<div class="card" id="card${pi}">
<div class="pupil-hdr">
  <div class="pupil-num">${pi+1}</div>
  <input type="text" class="pupil-name-inp" id="nm${pi}" placeholder="Pupil full name" value="${esc(p.name)}" oninput="S.pupils[${pi}].name=this.value" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false">
</div>`;
    if(rel){
      html+=`<div class="toggle-row">
<input type="checkbox" class="toggle" id="rel${pi}" ${p.inclRelig?'checked':''} onchange="toggleRel(${pi},this.checked)">
<label for="rel${pi}">Include ${rel}</label>
</div>`;
    }
    html+=`<div class="score-hdr"><span>Subject</span><span>Test 1</span><span>Test 2</span><span>Exam</span><span>Total</span></div>`;
    subjs.forEach((s,si)=>{
      const sc=p.scores[s]||{t1:'',t2:'',ex:''};
      const isRel=rel&&s===rel;
      const rowHide=isRel&&!p.inclRelig?'style="display:none"':'';
      const tot=calcTot(sc);
      const totCls=tot===null?'':tot>100||sc.t1>20||sc.t2>20||sc.ex>60?'tot-err':'tot-ok';
      const totDisp=tot===null?'—':tot;
      // Each input: id = i_pi_si_field
      html+=`<div class="score-row" id="row${pi}_${si}" ${rowHide}>
<span class="subj-lbl">${s}</span>
<input class="score-inp" id="i${pi}_${si}_t1" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${sc.t1}" oninput="liveUpdate(${pi},${si},'t1',this.value)" tabindex="${tabIdx(pi,si,0,subjs.length)}">
<input class="score-inp" id="i${pi}_${si}_t2" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${sc.t2}" oninput="liveUpdate(${pi},${si},'t2',this.value)" tabindex="${tabIdx(pi,si,1,subjs.length)}">
<input class="score-inp" id="i${pi}_${si}_ex" type="number" inputmode="numeric" min="0" max="60" placeholder="0" value="${sc.ex}" oninput="liveUpdate(${pi},${si},'ex',this.value)" tabindex="${tabIdx(pi,si,2,subjs.length)}">
<div class="tot-cell ${totCls}" id="tot${pi}_${si}">${totDisp}</div>
</div>`;
    });
    // Per-pupil summary bar
    const summary=calcPupilSummary(p,subjs,rel);
    html+=`<div class="pupil-summary" id="sum${pi}">
<div class="sum-chip"><span class="lbl">Subjects</span><span class="val" id="sn${pi}">${summary.count}</span></div>
<div class="sum-chip grand"><span class="lbl">Grand Total</span><span class="val" id="sg${pi}">${summary.grand}</span></div>
<div class="sum-chip avg"><span class="lbl">Average</span><span class="val" id="sa${pi}">${summary.avg}</span></div>
</div>
</div>`; // close card
  });

  html+=`<button class="btn btn-primary" onclick="doCalc()" style="margin-top:4px">View Full Results →</button>
<div class="spacer"></div>
<button class="btn" onclick="showStep1()">← Change class</button>`;
  document.getElementById('app').innerHTML=html;
}

/* Tab index: flows T1→T2→Ex across all subjects for one pupil, then next pupil */
function tabIdx(pi,si,col,total){
  // Within a pupil: si*3+col (0-based), then offset by pupil
  return pi*total*3 + si*3 + col + 1;
}

/* Live update: only touches the one total cell + pupil summary — NO re-render */
function liveUpdate(pi,si,field,val){
  const subjs=SUBJS[GRP[S.cls]];
  const s=subjs[si];
  S.pupils[pi].scores[s][field]=val===''?'':parseFloat(val)||0;
  // Update just this row's total cell
  const sc=S.pupils[pi].scores[s];
  const tot=calcTot(sc);
  const over=sc.t1>20||sc.t2>20||sc.ex>60||(tot!==null&&tot>100);
  const cell=document.getElementById('tot'+pi+'_'+si);
  if(cell){
    cell.textContent=tot===null?'—':tot;
    cell.className='tot-cell'+(tot===null?'':over?' tot-err':' tot-ok');
  }
  // Update pupil summary bar
  refreshSummary(pi);
}

function refreshSummary(pi){
  const grp=GRP[S.cls]; const subjs=SUBJS[grp]; const rel=RELIG[grp]||null;
  const sm=calcPupilSummary(S.pupils[pi],subjs,rel);
  const sn=document.getElementById('sn'+pi);
  const sg=document.getElementById('sg'+pi);
  const sa=document.getElementById('sa'+pi);
  if(sn) sn.textContent=sm.count;
  if(sg) sg.textContent=sm.grand;
  if(sa) sa.textContent=sm.avg;
}

function toggleRel(pi,checked){
  S.pupils[pi].inclRelig=checked;
  const grp=GRP[S.cls]; const rel=RELIG[grp];
  const subjs=SUBJS[grp];
  const relSi=subjs.indexOf(rel);
  if(relSi>=0){
    const row=document.getElementById('row'+pi+'_'+relSi);
    if(row) row.style.display=checked?'':'none';
  }
  refreshSummary(pi);
}

function calcTot(sc){
  if(sc.t1===''&&sc.t2===''&&sc.ex==='') return null;
  return (parseFloat(sc.t1)||0)+(parseFloat(sc.t2)||0)+(parseFloat(sc.ex)||0);
}

function calcPupilSummary(p,subjs,rel){
  const active=subjs.filter(s=>!(rel&&s===rel&&!p.inclRelig));
  const tots=active.map(s=>{const sc=p.scores[s]||{};return calcTot(sc)||0;});
  const grand=tots.reduce((a,b)=>a+b,0);
  const avg=tots.length?Math.round((grand/tots.length)*10)/10:0;
  return{count:active.length,grand,avg};
}

/* ═══ STEP 3 — Results ═══ */
function doCalc(){
  // Read any names not yet stored
  S.pupils.forEach((_,i)=>{
    const el=document.getElementById('nm'+i);
    if(el) S.pupils[i].name=el.value;
  });
  const grp=GRP[S.cls]; const subjs=SUBJS[grp]; const rel=RELIG[grp]||null;
  S.results=S.pupils.map(p=>{
    const active=subjs.filter(s=>!(rel&&s===rel&&!p.inclRelig));
    const tots=active.map(s=>{const sc=p.scores[s]||{};return(parseFloat(sc.t1)||0)+(parseFloat(sc.t2)||0)+(parseFloat(sc.ex)||0);});
    const grand=tots.reduce((a,b)=>a+b,0);
    const avg=tots.length?Math.round((grand/tots.length)*10)/10:0;
    return{name:p.name||'(no name)',active,tots,grand,avg};
  });
  showStep3();
}

function showStep3(){
  S.step=3; prog(3);
  const hasErr=S.results.some(r=>r.tots.some(t=>t>100));
  let html=`<p class="pg-title">${S.cls} — Results</p>
<p class="pg-sub">Verify against your manual computation</p>
${hasErr?'<div class="alert alert-danger">Some totals exceed 100. Go back and check.</div>':'<div class="alert alert-success">All totals are within range.</div>'}`;

  S.results.forEach((r,i)=>{
    html+=`<div class="card">
<div class="res-name"><span>${i+1}. ${esc(r.name)}</span><span class="badge">${r.active.length} subjects</span></div>
<table class="rt">
<thead><tr><th>Subject</th><th>Total /100</th></tr></thead><tbody>`;
    r.active.forEach((s,si)=>{
      const over=r.tots[si]>100;
      html+=`<tr><td>${s}</td><td ${over?'style="color:var(--danger-text);font-weight:600"':''}>${r.tots[si]}</td></tr>`;
    });
    html+=`</tbody><tfoot>
<tr class="sum-row grand"><td>Grand Total</td><td>${r.grand}</td></tr>
<tr class="sum-row avg"><td>Average ÷ ${r.active.length}</td><td>${r.avg}</td></tr>
</tfoot></table></div>`;
  });

  html+=`<button class="btn btn-success" onclick="doDownload()">Download Results as CSV</button>
<div class="spacer"></div>
<button class="btn btn-teal" onclick="showStep2()">← Back to scores</button>
<div class="spacer"></div>
<button class="btn" onclick="reset()">Start new class</button>`;
  document.getElementById('app').innerHTML=html;
}

/* ═══ CSV Download — full T1/T2/Ex per subject ═══ */
function doDownload(){
  const grp=GRP[S.cls]; const allSubjs=SUBJS[grp];
  const date=new Date().toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'});
  // Header: S/N, Pupil Name, [SubjName_T1, SubjName_T2, SubjName_Ex, SubjName_Total] x subjects, Grand Total, Subjects, Average, Includes_Relig
  const rel=RELIG[grp]||null;
  const hdr=['S/N','Pupil Name'];
  allSubjs.forEach(s=>hdr.push(s+'_T1',s+'_T2',s+'_Ex',s+'_Total'));
  hdr.push('Grand Total','Subjects','Average');
  if(rel) hdr.push('Includes_'+rel.replace(/\s/g,'_'));
  const rows=[hdr.join(',')];

  S.results.forEach((r,i)=>{
    const p=S.pupils[i];
    const row=[i+1,`"${r.name}"`];
    allSubjs.forEach(s=>{
      const isActive=r.active.includes(s);
      if(isActive){
        const sc=p.scores[s]||{t1:0,t2:0,ex:0};
        const tot=r.tots[r.active.indexOf(s)];
        row.push(sc.t1===''?0:sc.t1, sc.t2===''?0:sc.t2, sc.ex===''?0:sc.ex, tot);
      } else {
        row.push('','','','');
      }
    });
    row.push(r.grand,r.active.length,r.avg);
    if(rel) row.push(p.inclRelig?'Yes':'No');
    rows.push(row.join(','));
  });

  rows.push('',`"Class: ${S.cls}"`,`"Date: ${date}"`,`"E-Champions Result Verifier v2"`);
  const blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`${S.cls.replace(/\s/g,'_')}_${date.replace(/\s/g,'_')}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function reset(){S={step:1,cls:'Basic 5',n:0,pupils:[],results:[]};showStep1();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ═══ CSV Upload & Parse ═══ */
function handleUpload(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      loadFromCSV(e.target.result);
    } catch(err){
      alert('Could not read this file.\n\n'+err.message+'\n\nMake sure it was downloaded from this tool.');
      input.value='';
    }
  };
  reader.readAsText(file);
}

function parseRow(line){
  /* Handles quoted fields with commas */
  const res=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  res.push(cur.trim());
  return res;
}

function loadFromCSV(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim());

  /* ── 1. Detect class from footer ── */
  let cls=null;
  for(const line of lines){
    const m=line.replace(/^"|"$/g,'').match(/^Class:\s*(.+)$/);
    if(m){cls=m[1].trim();break;}
  }
  if(!cls) throw new Error('Class name not found in file. Is this a file from this tool?');
  if(!GRP[cls]) throw new Error(`"${cls}" is not a recognised class name.`);

  /* ── 2. Find header row (first non-empty line) ── */
  const headerLine=lines.find(l=>l.startsWith('S/N')||l.startsWith('"S/N'));
  if(!headerLine) throw new Error('Header row not found.');
  const headers=parseRow(headerLine);

  /* ── 3. Build column index map ── */
  // Expect columns like: EnglishName_T1, EnglishName_T2, EnglishName_Ex, EnglishName_Total
  const colMap={}; // 'SubjName|t1' => colIndex
  const nameCol=headers.findIndex(h=>h==='Pupil Name');
  if(nameCol<0) throw new Error('Pupil Name column not found.');

  const grp=GRP[cls]; const subjs=SUBJS[grp]; const rel=RELIG[grp]||null;

  subjs.forEach(s=>{
    ['T1','T2','Ex'].forEach(f=>{
      const key=s+'_'+f;
      const idx=headers.findIndex(h=>h===key);
      if(idx>=0) colMap[s+'|'+f.toLowerCase()]=idx;
    });
  });

  /* ── 4. Detect inclRelig column ── */
  let relCol=-1;
  if(rel){
    relCol=headers.findIndex(h=>h==='Includes_'+rel.replace(/\s/g,'_'));
  }

  /* ── 5. Parse data rows ── */
  const pupils=[];
  for(const line of lines){
    if(!line||line.startsWith('S/N')||line.startsWith('"S/N')) continue;
    const cols=parseRow(line);
    if(!cols[0]||isNaN(parseInt(cols[0]))) continue; // skip footer / summary rows

    const name=cols[nameCol]||'';
    const scores=Object.fromEntries(subjs.map(s=>[s,{t1:'',t2:'',ex:''}]));
    subjs.forEach(s=>{
      ['t1','t2','ex'].forEach(f=>{
        const idx=colMap[s+'|'+f];
        if(idx!==undefined&&cols[idx]!==undefined&&cols[idx]!==''){
          const v=parseFloat(cols[idx]);
          scores[s][f]=isNaN(v)?'':v;
        }
      });
    });

    let inclRelig=true;
    if(rel&&relCol>=0){
      inclRelig=cols[relCol]!=='No';
    }

    pupils.push({name,inclRelig,scores});
  }

  if(pupils.length===0) throw new Error('No pupil records found in this file.');

  /* ── 6. Load into state and go to Step 2 ── */
  S.cls=cls; S.n=pupils.length; S.pupils=pupils; S.results=[];
  showStep2();
}

showStep1();
</script>
